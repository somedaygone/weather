<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Weather">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Daily Weather</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root {
    --bg:#0a0e1a; --card:#111827; --border:rgba(255,255,255,0.08);
    --text:#e8eaf0; --muted:#6b7280; --accent:#f59e0b; --blue:#3b82f6;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);color:var(--text);
    font-family:ui-monospace,'SF Mono','Cascadia Mono','Segoe UI Mono',monospace;
    min-height:100vh;
    padding:max(env(safe-area-inset-top),20px) 18px max(env(safe-area-inset-bottom),20px);
  }
  body::before{
    content:'';position:fixed;top:-30vh;left:-20vw;width:80vw;height:80vw;
    background:radial-gradient(circle,rgba(96,165,250,0.07) 0%,transparent 70%);
    pointer-events:none;animation:drift 14s ease-in-out infinite alternate;z-index:0;
  }
  @keyframes drift{to{transform:translate(10vw,5vh);}}
  .wrap{position:relative;z-index:1;max-width:430px;margin:0 auto;}

  /* ── ZIP SCREEN ── */
  .zip-screen{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:80vh;gap:24px;text-align:center;
  }
  .zip-title{font-size:17px;letter-spacing:0.18em;color:var(--muted);text-transform:uppercase;}
  .zip-row{display:flex;gap:0;width:100%;max-width:380px;}
  .zip-input{
    flex:1;background:#1f2937;border:1px solid var(--border);border-right:none;
    border-radius:10px 0 0 10px;color:#fff;font-family:inherit;
    font-size:20px;letter-spacing:0.06em;padding:14px 16px;
    outline:none;text-align:center;width:0;transition:border-color 0.2s;
  }
  .zip-input:focus{border-color:var(--accent);}
  .zip-input::placeholder{color:var(--muted);font-size:16px;letter-spacing:0.06em;}
  .zip-btn{
    background:var(--accent);border:none;border-radius:0 10px 10px 0;
    color:#000;font-family:inherit;font-size:20px;font-weight:600;
    padding:14px 18px;cursor:pointer;transition:background 0.15s;letter-spacing:0.05em;
    white-space:nowrap;
  }
  .zip-btn:hover{background:#fbbf24;}
  .zip-btn:active{background:#d97706;}
  .zip-err{font-size:16px;color:#ef4444;letter-spacing:0.06em;min-height:20px;}

  /* ── HEADER ── */
  .header{
    padding:24px 0 6px;display:flex;justify-content:space-between;
    align-items:flex-start;flex-wrap:wrap;gap:4px 12px;
  }
  .date-time-wrap{flex-shrink:0;display:flex;flex-direction:column;gap:4px;}
  .date-label{font-size:15px;letter-spacing:0.14em;color:var(--muted);text-transform:uppercase;}
  .time-label{
    font-size:22px;letter-spacing:0.06em;color:var(--text);
    font-variant-numeric:tabular-nums;
  }
  .location-wrap{text-align:right;min-width:0;flex-shrink:1;overflow:hidden;}
  .location{
    font-size:16px;color:var(--muted);display:block;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .change-zip{
    font-size:14px;color:var(--accent);letter-spacing:0.08em;
    background:none;border:none;cursor:pointer;font-family:inherit;
    padding:2px 0;text-transform:uppercase;opacity:0.8;
  }
  .change-zip:hover{opacity:1;}

  /* ── HERO ── */
  .hero{padding:10px 0 24px;border-bottom:1px solid var(--border);margin-bottom:24px;}
  .hero-main{display:flex;align-items:flex-end;gap:16px;}
  .current-temp{
    font-size:88px;line-height:1;letter-spacing:-3px;color:#fff;
    font-family:Georgia,'Times New Roman',serif;
    text-shadow:0 0 60px rgba(245,158,11,0.25);
  }
  .hero-right{padding-bottom:10px;}
  .weather-desc{font-size:18px;color:var(--muted);margin-bottom:8px;font-style:italic;}
  .hi-lo{font-size:18px;letter-spacing:0.04em;}
  .hi{color:#fbbf24;} .lo{color:var(--blue);margin-left:10px;}

  /* ── CHART ── */
  .chart-card{
    background:var(--card);border:1px solid var(--border);
    border-radius:18px;padding:14px 14px 14px;margin-bottom:20px;
  }
  .chart-title{font-size:14px;letter-spacing:0.16em;color:var(--muted);text-transform:uppercase;margin-bottom:12px;}
  .chart-wrap{position:relative;line-height:0;}
  canvas#chart{display:block;cursor:crosshair;}
  .chart-tooltip{
    position:absolute;background:#1f2937;border:1px solid var(--border);
    border-radius:8px;padding:8px 12px;pointer-events:none;
    font-size:14px;line-height:1.8;white-space:nowrap;
    opacity:0;transition:opacity 0.1s;
    transform:translateX(-50%);top:4px;
  }
  .tt-time{color:var(--muted);font-size:13px;letter-spacing:0.08em;margin-bottom:2px;}
  .tt-temp{color:#f59e0b;}
  .tt-rain{color:#3b82f6;}
  .chart-legend{display:flex;gap:16px;margin-top:10px;}
  .legend-item{display:flex;align-items:center;gap:7px;font-size:14px;color:var(--muted);letter-spacing:0.06em;}
  .legend-line{width:22px;height:2px;border-radius:2px;}

  /* ── FORECAST CARDS ── */
  .section-label{font-size:14px;letter-spacing:0.16em;color:var(--muted);text-transform:uppercase;margin-bottom:12px;}
  .forecast-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
  .day-card{
    background:var(--card);border:1px solid var(--border);border-radius:16px;
    padding:16px 13px;display:flex;flex-direction:column;gap:6px;
    align-items:center;text-align:center;
  }
  .day-name{font-size:14px;letter-spacing:0.14em;color:var(--muted);text-transform:uppercase;}
  .day-icon{font-size:38px;line-height:1.1;}
  .day-temps{display:flex;gap:8px;align-items:baseline;justify-content:center;}
  .day-hi{font-size:22px;color:#fff;font-family:Georgia,serif;}
  .day-lo{font-size:18px;color:var(--muted);font-family:Georgia,serif;}
  .day-rain{font-size:15px;color:var(--blue);}
  .day-rain-placeholder{font-size:15px;opacity:0;}

  /* ── RADAR ── */
  .radar-section{margin-bottom:32px;}
  .radar-card{
    background:var(--card);border:1px solid var(--border);border-radius:16px;
    overflow:hidden;height:290px;position:relative;
  }
  #radar-map{width:100%;height:100%;}
  .radar-loading{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:var(--muted);font-size:15px;letter-spacing:0.08em;
    background:var(--card);z-index:10;
  }

  /* ── LOADING ── */
  .loading{text-align:center;padding:80px 20px;color:var(--muted);font-size:17px;}
  .spinner{
    width:28px;height:28px;border:2px solid var(--border);
    border-top-color:var(--accent);border-radius:50%;
    animation:spin 0.9s linear infinite;margin:0 auto 16px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ── FOOTER ── */
  .footer{text-align:center;padding:8px 0 4px;font-size:12px;color:var(--muted);letter-spacing:0.06em;opacity:0.5;}
  .footer a{color:inherit;text-decoration:none;}
  .footer a:hover{opacity:1;color:var(--text);}
  .footer-credits{text-align:center;padding:2px 0 8px;font-size:11px;color:var(--muted);letter-spacing:0.04em;opacity:0.35;line-height:1.6;}
  .leaflet-container{background:#0a0e1a;}
  .leaflet-control-attribution{font-size:9px !important;}

  .fade{animation:fadeIn 0.5s ease forwards;opacity:0;}
  .d1{animation-delay:0.05s;}.d2{animation-delay:0.2s;}
  .d3{animation-delay:0.35s;}.d4{animation-delay:0.5s;}.d5{animation-delay:0.65s;}
  @keyframes fadeIn{to{opacity:1;}}

  /* ── AQI ── */
  .aqi-hero{font-size:15px;letter-spacing:0.06em;margin-left:12px;}
  canvas#aqiChart{display:block;cursor:crosshair;}
  .aqi-4day{
    display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
    background:var(--card);border:1px solid var(--border);
    border-radius:18px;padding:14px 16px;margin-bottom:20px;
  }
  .aqi-day{display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;}
  .aqi-day-label{font-size:11px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}
  .aqi-day-circle{
    width:44px;height:44px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;font-weight:600;font-family:Georgia,serif;
  }
  .aqi-day-text{font-size:10px;letter-spacing:0.04em;line-height:1.3;}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const WMO={0:['Clear Sky','☀️'],1:['Mainly Clear','🌤️'],2:['Partly Cloudy','⛅'],3:['Overcast','☁️'],
  45:['Foggy','🌫️'],48:['Icy Fog','🌫️'],51:['Light Drizzle','🌦️'],53:['Drizzle','🌦️'],
  55:['Heavy Drizzle','🌧️'],61:['Light Rain','🌧️'],63:['Rain','🌧️'],65:['Heavy Rain','⛈️'],
  71:['Light Snow','🌨️'],73:['Snow','❄️'],75:['Heavy Snow','❄️'],77:['Snow Grains','🌨️'],
  80:['Rain Showers','🌦️'],81:['Heavy Showers','🌧️'],82:['Violent Showers','⛈️'],
  85:['Snow Showers','🌨️'],86:['Heavy Snow Showers','❄️'],
  95:['Thunderstorm','⛈️'],96:['Thunderstorm','⛈️'],99:['Thunderstorm','⛈️']};
const wmo=c=>WMO[c]||['Unknown','🌡️'];

/* Official EPA AQI bands */
const AQI_BANDS=[
  {max:50,  label:'Good',                    color:'#00E400',dark:'rgba(0,228,0,0.07)'},
  {max:100, label:'Moderate',                color:'#FFFF00',dark:'rgba(255,255,0,0.07)'},
  {max:150, label:'Unhealthy for Sensitive', color:'#FF7E00',dark:'rgba(255,126,0,0.07)'},
  {max:200, label:'Unhealthy',               color:'#FF0000',dark:'rgba(255,0,0,0.07)'},
  {max:300, label:'Very Unhealthy',          color:'#8F3F97',dark:'rgba(143,63,151,0.07)'},
  {max:500, label:'Hazardous',               color:'#7E0026',dark:'rgba(126,0,38,0.07)'},
];
const getAqiBand=v=>AQI_BANDS.find(b=>v<=b.max)||AQI_BANDS[AQI_BANDS.length-1];

const NOMINATIM_STATE_MAP={'Alabama':'AL','Alaska':'AK','Arizona':'AZ','Arkansas':'AR','California':'CA',
  'Colorado':'CO','Connecticut':'CT','Delaware':'DE','Florida':'FL','Georgia':'GA','Hawaii':'HI',
  'Idaho':'ID','Illinois':'IL','Indiana':'IN','Iowa':'IA','Kansas':'KS','Kentucky':'KY',
  'Louisiana':'LA','Maine':'ME','Maryland':'MD','Massachusetts':'MA','Michigan':'MI',
  'Minnesota':'MN','Mississippi':'MS','Missouri':'MO','Montana':'MT','Nebraska':'NE',
  'Nevada':'NV','New Hampshire':'NH','New Jersey':'NJ','New Mexico':'NM','New York':'NY',
  'North Carolina':'NC','North Dakota':'ND','Ohio':'OH','Oklahoma':'OK','Oregon':'OR',
  'Pennsylvania':'PA','Rhode Island':'RI','South Carolina':'SC','South Dakota':'SD',
  'Tennessee':'TN','Texas':'TX','Utah':'UT','Vermont':'VT','Virginia':'VA',
  'Washington':'WA','West Virginia':'WV','Wisconsin':'WI','Wyoming':'WY'};
const fmtDate=()=>new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}).toUpperCase();
const fmtTime=()=>new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true}).toUpperCase();
let _refreshTimer=null;
const REFRESH_MS=15*60*1000;
function scheduleRefresh(zip){
  if(_refreshTimer)clearInterval(_refreshTimer);
  _refreshTimer=setInterval(()=>loadWeather(zip),REFRESH_MS);
}
const dayLabel=s=>{const d=new Date(s+'T12:00:00');return d.toLocaleDateString('en-US',{weekday:'short'}).toUpperCase()+' '+(d.getMonth()+1)+'/'+d.getDate();};
const app=document.getElementById('app');
const DEFAULT_ZIP='62854';

/* ── Canvas Chart with hover ──────────────────────────── */
function setupChart(canvas, tooltip, labels, temps, rains) {
  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.clientWidth;
  const H=170;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  canvas.width=W*dpr; canvas.height=H*dpr;
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const PL=44,PR=46,PT=10,PB=30;
  const pw=W-PL-PR,ph=H-PT-PB,n=labels.length;
  const tMin=Math.min(...temps)-4,tMax=Math.max(...temps)+4;
  const xOf=i=>PL+(i/(n-1))*pw;
  const yT=t=>PT+ph-((t-tMin)/(tMax-tMin))*ph;
  const yR=r=>PT+ph-(r/100)*ph;

  function drawBase(){
    ctx.clearRect(0,0,W,H);
    ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;
    for(let i=0;i<=4;i++){const y=PT+(ph/4)*i;ctx.beginPath();ctx.moveTo(PL,y);ctx.lineTo(PL+pw,y);ctx.stroke();}
    // "now" line — drawn behind data lines
    const _now=new Date(),_nowH=_now.getHours(),_nowM=_now.getMinutes();
    const _nowHadj=_nowH<8?_nowH+24:_nowH;
    if(_nowHadj>=8&&_nowHadj<=24){
      const _nf=(_nowHadj-8+_nowM/60)/16;
      const _nx=PL+_nf*pw;
      ctx.save();ctx.strokeStyle='rgba(255,255,255,0.28)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(_nx,PT);ctx.lineTo(_nx,PT+ph);ctx.stroke();
      ctx.font='10px ui-monospace,monospace';ctx.fillStyle='rgba(255,255,255,0.35)';
      ctx.textAlign='center';ctx.fillText('NOW',_nx,PT+ph+13);
      ctx.restore();
    }
    const g=ctx.createLinearGradient(0,PT,0,PT+ph);
    g.addColorStop(0,'rgba(245,158,11,0.3)');g.addColorStop(1,'rgba(245,158,11,0)');
    ctx.beginPath();ctx.moveTo(xOf(0),yT(temps[0]));
    for(let i=1;i<n;i++){const mx=(xOf(i-1)+xOf(i))/2,my=(yT(temps[i-1])+yT(temps[i]))/2;ctx.quadraticCurveTo(xOf(i-1),yT(temps[i-1]),mx,my);}
    ctx.lineTo(xOf(n-1),yT(temps[n-1]));ctx.lineTo(xOf(n-1),PT+ph);ctx.lineTo(xOf(0),PT+ph);
    ctx.closePath();ctx.fillStyle=g;ctx.fill();
    ctx.strokeStyle='#f59e0b';ctx.lineWidth=2;ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(xOf(0),yT(temps[0]));
    for(let i=1;i<n;i++){const mx=(xOf(i-1)+xOf(i))/2,my=(yT(temps[i-1])+yT(temps[i]))/2;ctx.quadraticCurveTo(xOf(i-1),yT(temps[i-1]),mx,my);}
    ctx.lineTo(xOf(n-1),yT(temps[n-1]));ctx.stroke();
    ctx.strokeStyle='#3b82f6';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(xOf(0),yR(rains[0]));
    for(let i=1;i<n;i++){const mx=(xOf(i-1)+xOf(i))/2,my=(yR(rains[i-1])+yR(rains[i]))/2;ctx.quadraticCurveTo(xOf(i-1),yR(rains[i-1]),mx,my);}
    ctx.lineTo(xOf(n-1),yR(rains[n-1]));ctx.stroke();
    ctx.fillStyle='#6b7280';ctx.font=`13px ui-monospace,monospace`;ctx.textAlign='center';
    for(let i=0;i<n;i++){if(i%2===0)ctx.fillText(labels[i],xOf(i),H-8);}
    ctx.textAlign='right';ctx.fillStyle='#f59e0b';
    const tStep=(tMax-tMin)/4;
    for(let i=0;i<=4;i++){const t=Math.round(tMin+tStep*i);ctx.fillText(t+'°',PL-4,yT(t)+4);}
    ctx.textAlign='left';ctx.fillStyle='#3b82f6';
    for(const p of[0,25,50,75,100])ctx.fillText(p+'%',PL+pw+4,yR(p)+4);
  }

  function drawHover(idx){
    drawBase();
    if(idx<0||idx>=n)return;
    const x=xOf(idx);
    ctx.save();
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(x,PT);ctx.lineTo(x,PT+ph);ctx.stroke();
    ctx.restore();
    ctx.beginPath();ctx.arc(x,yT(temps[idx]),5,0,Math.PI*2);ctx.fillStyle='#f59e0b';ctx.fill();
    ctx.beginPath();ctx.arc(x,yR(rains[idx]),5,0,Math.PI*2);ctx.fillStyle='#3b82f6';ctx.fill();
    const left=Math.max(50,Math.min(W-50,x));
    tooltip.style.left=left+'px';tooltip.style.opacity='1';
    tooltip.innerHTML=`<div class="tt-time">${labels[idx].toUpperCase()}</div><div class="tt-temp">🌡 ${temps[idx]}°F</div><div class="tt-rain">💧 ${rains[idx]}%</div>`;
  }

  function hideHover(){drawBase();tooltip.style.opacity='0';}

  function getIdx(clientX){
    const rect=canvas.getBoundingClientRect();
    const mouseX=clientX-rect.left;
    let best=-1,bestDist=Infinity;
    for(let i=0;i<n;i++){const d=Math.abs(xOf(i)-mouseX);if(d<bestDist){bestDist=d;best=i;}}
    return bestDist<(pw/(n-1))*0.8?best:-1;
  }

  canvas.addEventListener('mousemove',e=>{const i=getIdx(e.clientX);i>=0?drawHover(i):hideHover();});
  canvas.addEventListener('mouseleave',hideHover);
  canvas.addEventListener('touchmove',e=>{e.preventDefault();const i=getIdx(e.touches[0].clientX);i>=0?drawHover(i):hideHover();},{passive:false});
  canvas.addEventListener('touchend',hideHover);
  drawBase();
}

/* ── AQI Chart ──────────────────────────────────────────── */
function setupAQIChart(canvas, tooltip, hours) {
  if(!hours||!hours.length)return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.clientWidth;
  const H=170;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  canvas.width=W*dpr; canvas.height=H*dpr;
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const PL=46,PR=14,PT=10,PB=30;
  const pw=W-PL-PR,ph=H-PT-PB,n=hours.length;
  const vals=hours.map(h=>h.aqi);
  const MIN=0,MAX=Math.max(160,Math.max(...vals)+20);
  const xOf=i=>PL+(i/(n-1))*pw;
  const yOf=v=>PT+ph-((v-MIN)/(MAX-MIN))*ph;

  function drawBase(){
    ctx.clearRect(0,0,W,H);
    // band backgrounds
    const bandEdges=[50,100,150,200,MAX];
    let lo=0;
    for(const hi of bandEdges){
      if(lo>=MAX)break;
      const top=Math.min(hi,MAX);
      ctx.fillStyle=getAqiBand(top-1).dark;
      const y1=yOf(top),y2=yOf(lo);
      ctx.fillRect(PL,y1,pw,y2-y1);
      lo=top;
    }
    // grid lines at thresholds
    ctx.lineWidth=1;
    for(const v of[50,100,150,200]){
      if(v>=MAX)continue;
      ctx.strokeStyle='rgba(255,255,255,0.07)';
      ctx.beginPath();ctx.moveTo(PL,yOf(v));ctx.lineTo(PL+pw,yOf(v));ctx.stroke();
    }
    // "now" line
    const _now=new Date(),_nowH=_now.getHours(),_nowM=_now.getMinutes();
    const _nowHadj=_nowH<8?_nowH+24:_nowH;
    if(_nowHadj>=8&&_nowHadj<=24){
      const _nf=(_nowHadj-8+_nowM/60)/16;
      const _nx=PL+_nf*pw;
      ctx.save();ctx.strokeStyle='rgba(255,255,255,0.28)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(_nx,PT);ctx.lineTo(_nx,PT+ph);ctx.stroke();
      ctx.restore();
    }
    // gradient fill under line
    const grad=ctx.createLinearGradient(0,PT,0,PT+ph);
    grad.addColorStop(0,'rgba(255,0,0,0.15)');
    grad.addColorStop(0.4,'rgba(255,126,0,0.10)');
    grad.addColorStop(0.7,'rgba(255,255,0,0.07)');
    grad.addColorStop(1,'rgba(0,228,0,0.03)');
    ctx.beginPath();ctx.moveTo(xOf(0),yOf(vals[0]));
    for(let i=1;i<n;i++){const mx=(xOf(i-1)+xOf(i))/2,my=(yOf(vals[i-1])+yOf(vals[i]))/2;ctx.quadraticCurveTo(xOf(i-1),yOf(vals[i-1]),mx,my);}
    ctx.lineTo(xOf(n-1),yOf(vals[n-1]));ctx.lineTo(xOf(n-1),PT+ph);ctx.lineTo(xOf(0),PT+ph);
    ctx.closePath();ctx.fillStyle=grad;ctx.fill();
    // colored line segments
    ctx.lineWidth=2.5;ctx.lineJoin='round';
    for(let i=0;i<n-1;i++){
      const midVal=(vals[i]+vals[i+1])/2;
      ctx.strokeStyle=getAqiBand(midVal).color;
      const mx=(xOf(i)+xOf(i+1))/2,my=(yOf(vals[i])+yOf(vals[i+1]))/2;
      ctx.beginPath();ctx.moveTo(xOf(i),yOf(vals[i]));ctx.quadraticCurveTo(xOf(i),yOf(vals[i]),mx,my);ctx.stroke();
      ctx.beginPath();ctx.moveTo(mx,my);ctx.quadraticCurveTo(xOf(i+1),yOf(vals[i+1]),xOf(i+1),yOf(vals[i+1]));ctx.stroke();
    }
    // dots
    for(let i=0;i<n;i++){
      ctx.beginPath();ctx.arc(xOf(i),yOf(vals[i]),4.5,0,Math.PI*2);
      ctx.fillStyle=getAqiBand(vals[i]).color;ctx.fill();
    }
    // y-axis labels
    ctx.font=`12px ui-monospace,monospace`;ctx.textAlign='right';
    for(const v of[0,50,100,150]){
      if(v>=MAX)continue;
      ctx.fillStyle=v===0?'#6b7280':getAqiBand(v).color+'cc';
      ctx.fillText(v===0?'0':v,PL-5,yOf(v)+4);
    }
    // x-axis labels every other
    ctx.fillStyle='#6b7280';ctx.textAlign='center';
    for(let i=0;i<n;i++){if(i%2===0)ctx.fillText(hours[i].label,xOf(i),H-8);}
  }

  function drawHover(idx){
    drawBase();
    if(idx<0||idx>=n)return;
    const x=xOf(idx);
    ctx.save();ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(x,PT);ctx.lineTo(x,PT+ph);ctx.stroke();ctx.restore();
    ctx.beginPath();ctx.arc(x,yOf(vals[idx]),7,0,Math.PI*2);
    ctx.fillStyle=getAqiBand(vals[idx]).color;ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
    const left=Math.max(60,Math.min(W-60,x));
    tooltip.style.left=left+'px';tooltip.style.opacity='1';
    const band=getAqiBand(vals[idx]);
    tooltip.innerHTML=`<div class="tt-time">${hours[idx].label.toUpperCase()}</div><div style="color:${band.color};font-weight:600">AQI ${vals[idx]} · ${band.label}</div>`;
  }

  function hideHover(){drawBase();tooltip.style.opacity='0';}

  function getIdx(clientX){
    const rect=canvas.getBoundingClientRect();
    const mouseX=clientX-rect.left;
    let best=-1,bestDist=Infinity;
    for(let i=0;i<n;i++){const d=Math.abs(xOf(i)-mouseX);if(d<bestDist){bestDist=d;best=i;}}
    return bestDist<(pw/(n-1))*0.8?best:-1;
  }

  canvas.addEventListener('mousemove',e=>{const i=getIdx(e.clientX);i>=0?drawHover(i):hideHover();});
  canvas.addEventListener('mouseleave',hideHover);
  canvas.addEventListener('touchmove',e=>{e.preventDefault();const i=getIdx(e.touches[0].clientX);i>=0?drawHover(i):hideHover();},{passive:false});
  canvas.addEventListener('touchend',hideHover);
  drawBase();
}

/* ── Radar ─────────────────────────────────────────────── */
async function initRadar(lat, lon) {
  try {
    // Get latest RainViewer radar timestamp
    const r = await fetch('https://api.rainviewer.com/public/weather-maps.json');
    const data = await r.json();
    const past = data.radar.past;
    const latest = past[past.length - 1].time;

    const map = L.map('radar-map', {
      center: [lat, lon],
      zoom: 7,
      zoomControl: true,
      attributionControl: true,
    });

    // Dark base map
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CARTO',
      subdomains: 'abcd',
      maxZoom: 19,
    }).addTo(map);

    // RainViewer radar overlay
    L.tileLayer(`https://tilecache.rainviewer.com/v2/radar/${latest}/512/{z}/{x}/{y}/2/1_1.png`, {
      opacity: 0.6,
      attribution: '© RainViewer',
    }).addTo(map);

    // Location dot
    L.circleMarker([lat, lon], {
      radius: 6,
      fillColor: '#f59e0b',
      fillOpacity: 1,
      color: '#fff',
      weight: 2,
    }).addTo(map);

    // Remove loading overlay
    const loading = document.querySelector('.radar-loading');
    if (loading) loading.remove();

  } catch(e) {
    const loading = document.querySelector('.radar-loading');
    if (loading) loading.textContent = 'Radar unavailable';
  }
}

/* ── ZIP SCREEN ─────────────────────────────────────────── */
function showZipScreen(errMsg=''){
  app.innerHTML=`
    <div class="zip-screen">
      <div class="zip-title">Enter ZIP Code or City</div>
      <div class="zip-row">
        <input class="zip-input" id="zipInput" type="text" inputmode="text"
          maxlength="60" placeholder="62854 or Blue Springs, MO" autocomplete="off">
        <button class="zip-btn" id="zipBtn">Go →</button>
      </div>
      <div class="zip-err" id="zipErr">${errMsg}</div>
    </div>`;
  const input=document.getElementById('zipInput');
  const btn=document.getElementById('zipBtn');
  const saved=localStorage.getItem('wx_zip');
  if(saved)input.value=saved;
  input.focus();
  input.addEventListener('keydown',e=>{if(e.key==='Enter')btn.click();});
  btn.addEventListener('click',()=>{
    const val=input.value.trim();
    loadWeather(val||DEFAULT_ZIP);
  });
}

function showLoading(msg='Loading weather…'){
  app.innerHTML=`<div class="loading"><div class="spinner"></div>${msg}</div>`;
}

/* ── LOAD WEATHER ─────────────────────────────────────── */
async function loadWeather(query){
  showLoading('Looking up location…');
  let lat,lon,city;
  const isZip=/^\d{5}$/.test(query.trim());
  try{
    if(isZip){
      const r=await fetch(`https://api.zippopotam.us/us/${query.trim()}`);
      if(!r.ok)throw new Error('ZIP not found');
      const z=await r.json();
      lat=parseFloat(z.places[0].latitude);
      lon=parseFloat(z.places[0].longitude);
      city=`${z.places[0]['place name']}, ${z.places[0]['state abbreviation']}`;
    } else {
      // Parse city and optional state
      const parts=query.split(',').map(s=>s.trim());
      const cityPart=parts[0];
      const statePart=parts[1]||'';
      // Use Nominatim structured query - separates city from state explicitly
      const nomP=new URLSearchParams({city:cityPart,format:'json',addressdetails:'1',limit:'10',countrycodes:'us'});
      if(statePart)nomP.set('state',statePart);
      const r=await fetch('https://nominatim.openstreetmap.org/search?'+nomP,{
        headers:{'Accept-Language':'en-US','User-Agent':'somedaygone-weather-app'}
      });
      if(!r.ok)throw new Error('Geocoding failed');
      const g=await r.json();
      console.log('[GEO] Structured results:',g.map(x=>({name:x.display_name,class:x.class,type:x.type})));
      if(!g.length)throw new Error('Location not found');
      const best=g[0];
      lat=parseFloat(best.lat);
      lon=parseFloat(best.lon);
      const nomAddr=best.address||{};
      const placeName=nomAddr.city||nomAddr.town||nomAddr.village||nomAddr.hamlet||cityPart;
      const stateAbbr=NOMINATIM_STATE_MAP[nomAddr.state]||nomAddr.state||'';
      city=`${placeName}${stateAbbr?', '+stateAbbr:''}`;
    }
  }catch(e){
    showZipScreen(`Location not found: "${query}". Try a ZIP code or "Blue Springs, MO".`);
    return;
  }

  showLoading('Fetching weather…');
  let d;
  try{
    const p=new URLSearchParams({
      latitude:lat,longitude:lon,
      current:'temperature_2m,weathercode',
      hourly:'temperature_2m,precipitation_probability',
      daily:'temperature_2m_max,temperature_2m_min,weathercode,precipitation_probability_max,precipitation_sum',
      temperature_unit:'fahrenheit',
      precipitation_unit:'inch',
      timezone:'auto',
      forecast_days:6
    });
    const r=await fetch('https://api.open-meteo.com/v1/forecast?'+p);
    if(!r.ok)throw new Error(`Weather API error ${r.status}`);
    d=await r.json();
    if(!d?.current?.temperature_2m)throw new Error('Unexpected response');
  }catch(e){
    showZipScreen(`Weather fetch failed: ${e.message}`);
    return;
  }

  localStorage.setItem('wx_zip',query);

  const curTemp=Math.round(d.current.temperature_2m);
  const [wLabel,wIcon]=wmo(d.current.weathercode);
  const todayHi=Math.round(d.daily.temperature_2m_max[0]);
  const todayLo=Math.round(d.daily.temperature_2m_min[0]);
  const today=d.daily.time[0];
  const hrs=[];
  for(let h=8;h<=23;h++){
    const key=`${today}T${String(h).padStart(2,'0')}:00`;
    const idx=d.hourly.time.indexOf(key);
    if(idx!==-1)hrs.push({
      label:h===12?'12pm':h>12?`${h-12}pm`:`${h}am`,
      temp:Math.round(d.hourly.temperature_2m[idx]),
      rain:d.hourly.precipitation_probability[idx]??0
    });
  }
  // Midnight = hour 0 of the next day
  const tomorrow=d.daily.time[1];
  if(tomorrow){
    const midKey=`${tomorrow}T00:00`;
    const midIdx=d.hourly.time.indexOf(midKey);
    if(midIdx!==-1)hrs.push({
      label:'12am',
      temp:Math.round(d.hourly.temperature_2m[midIdx]),
      rain:d.hourly.precipitation_probability[midIdx]??0
    });
  }

  const fc=[1,2,3,4].map(i=>({
    date:d.daily.time[i],
    hi:Math.round(d.daily.temperature_2m_max[i]),
    lo:Math.round(d.daily.temperature_2m_min[i]),
    code:d.daily.weathercode[i],
    precip:d.daily.precipitation_probability_max[i]??0,
    precipIn:d.daily.precipitation_sum[i]??0,
  }));

  // ── Fetch AQI (graceful degradation) ───────────────────
  let aqiHrs=[],curAqi=null,aqiFc=[];
  try{
    const aqiP=new URLSearchParams({latitude:lat,longitude:lon,hourly:'us_aqi',timezone:'auto',forecast_days:5});
    const aqiUrl='https://air-quality-api.open-meteo.com/v1/air-quality?'+aqiP;
    console.log('[AQI] Fetching:',aqiUrl);
    const ar=await fetch(aqiUrl);
    console.log('[AQI] HTTP status:',ar.status,ar.statusText);
    if(ar.ok){
      const ad=await ar.json();
      console.log('[AQI] Raw response:',JSON.stringify(ad,null,2));
      const sampleVals=ad.hourly?.us_aqi?.slice(0,24);
      console.log('[AQI] First 24 hourly us_aqi values:',sampleVals);
      console.log('[AQI] Non-null count:',sampleVals?.filter(v=>v!=null).length??0);
      for(let h=8;h<=23;h++){
        const key=`${today}T${String(h).padStart(2,'0')}:00`;
        const idx=ad.hourly.time.indexOf(key);
        if(idx!==-1&&ad.hourly.us_aqi[idx]!=null)
          aqiHrs.push({label:h===12?'12pm':h>12?`${h-12}pm`:`${h}am`,aqi:Math.round(ad.hourly.us_aqi[idx])});
      }
      // Midnight = hour 0 of next day
      if(tomorrow){
        const midKey=`${tomorrow}T00:00`;
        const midIdx=ad.hourly.time.indexOf(midKey);
        if(midIdx!==-1&&ad.hourly.us_aqi[midIdx]!=null)
          aqiHrs.push({label:'12am',aqi:Math.round(ad.hourly.us_aqi[midIdx])});
      }
      console.log('[AQI] Parsed today hours:',aqiHrs);
      const nowH=new Date().getHours();
      const ck=`${today}T${String(nowH).padStart(2,'0')}:00`;
      const ci=ad.hourly.time.indexOf(ck);
      if(ci!==-1&&ad.hourly.us_aqi[ci]!=null)curAqi=Math.round(ad.hourly.us_aqi[ci]);
      console.log('[AQI] Current hour AQI:',curAqi);
      aqiFc=[1,2,3,4].map(i=>{
        const day=d.daily.time[i];let mx=0;
        for(let h=0;h<=23;h++){
          const k=`${day}T${String(h).padStart(2,'0')}:00`;
          const ix=ad.hourly.time.indexOf(k);
          if(ix!==-1&&ad.hourly.us_aqi[ix]!=null)mx=Math.max(mx,Math.round(ad.hourly.us_aqi[ix]));
        }
        return{date:day,aqi:mx};
      });
      console.log('[AQI] 4-day forecast:',aqiFc);
    } else {
      console.warn('[AQI] Non-OK response:',await ar.text());
    }
  }catch(e){
    console.error('[AQI] Fetch error:',e);
  }

  const curAqiBand=curAqi!==null?getAqiBand(curAqi):null;

  app.innerHTML=`
    <div class="header fade d1">
      <div class="date-time-wrap">
        <div class="date-label">${fmtDate()}</div>
        <div class="time-label" id="liveClock">${fmtTime()}</div>
      </div>
      <div class="location-wrap">
        <span class="location" title="${city}${isZip?' '+query:''}">${city}${isZip?' '+query:''}</span>
        <button class="change-zip" id="changeZip">change location</button>
      </div>
    </div>
    <div class="hero fade d1">
      <div class="hero-main">
        <div class="current-temp">${curTemp}°</div>
        <div class="hero-right">
          <div class="weather-desc">${wIcon} ${wLabel}</div>
          <div class="hi-lo"><span class="hi">↑ ${todayHi}°</span><span class="lo">↓ ${todayLo}°</span>${curAqiBand?`<span class="aqi-hero" style="color:${curAqiBand.color}">· AQI ${curAqi}</span>`:''}
          </div>
        </div>
      </div>
    </div>
    <div class="fade d2">
      <div class="section-label">Today's Forecast · 8 AM – Midnight</div>
      <div class="chart-card">
        <div class="chart-wrap">
          <canvas id="chart"></canvas>
          <div class="chart-tooltip" id="chartTooltip"></div>
        </div>
        <div class="chart-legend">
          <div class="legend-item"><div class="legend-line" style="background:#f59e0b"></div>Temperature °F</div>
          <div class="legend-item"><div class="legend-line" style="background:#3b82f6"></div>Precip. Probability</div>
        </div>
      </div>
    </div>
    <div class="fade d3">
      <div class="section-label">4-Day Outlook</div>
      <div class="forecast-grid">
        ${fc.map((day,i)=>{
          const[,di]=wmo(day.code);
          const hasRain=day.precip>0;
          const inStr=day.precipIn>=0.01?` · ${day.precipIn.toFixed(2)}"` : '';
          return`<div class="day-card">
            <div class="day-name">${dayLabel(day.date)}</div>
            <div class="day-icon">${di}</div>
            <div class="day-temps">
              <span class="day-hi">${day.hi}°</span>
              <span class="day-lo">${day.lo}°</span>
            </div>
            ${hasRain
              ? `<div class="day-rain">💧 ${day.precip}%${inStr}</div>`
              : `<div class="day-rain-placeholder">·</div>`}
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="radar-section fade d4">
      <div class="section-label">Current Radar</div>
      <div class="radar-card">
        <div class="radar-loading">Loading radar…</div>
        <div id="radar-map"></div>
      </div>
    </div>
    ${aqiHrs.length?`
    <div class="fade d5">
      <div class="section-label">Air Quality · Today's Forecast</div>
      <div class="chart-card">
        <div class="chart-wrap">
          <canvas id="aqiChart"></canvas>
          <div class="chart-tooltip" id="aqiTooltip"></div>
        </div>
        <div class="chart-legend" style="flex-wrap:wrap;row-gap:6px;">
          <div class="legend-item" style="width:100%;display:flex;gap:12px;">
            ${AQI_BANDS.slice(0,2).map(b=>`<span class="legend-item"><div class="legend-line" style="background:${b.color}"></div>${b.label}</span>`).join('')}
          </div>
          <div class="legend-item" style="width:100%;display:flex;gap:12px;">
            ${AQI_BANDS.slice(2,6).map(b=>`<span class="legend-item"><div class="legend-line" style="background:${b.color}"></div>${b.label}</span>`).join('')}
          </div>
        </div>
      </div>
      <div class="section-label">Air Quality · 4-Day Outlook</div>
      <div class="aqi-4day">
        ${aqiFc.map(d=>{const b=getAqiBand(d.aqi);return`<div class="aqi-day">
          <div class="aqi-day-label">${dayLabel(d.date)}</div>
          <div class="aqi-day-circle" style="color:${b.color};background:${b.color}22;border:2px solid ${b.color}55">${d.aqi}</div>
          <div class="aqi-day-text" style="color:${b.color}aa">${b.label}</div>
        </div>`;}).join('')}
      </div>
    </div>`:''}
    <div class="footer"><a href="https://somedaygone.github.io/weather/" target="_blank">https://somedaygone.github.io/weather/</a></div>
    <div class="footer-credits">Designed by Mike · Created by Claude · Weather &amp; air quality by Open-Meteo · Radar data by RainViewer · Maps by Leaflet · ZIP lookup by zippopotam.us · City lookup by Nominatim / OpenStreetMap</div>
  `;

  document.getElementById('changeZip').addEventListener('click',()=>{
    if(_refreshTimer){clearInterval(_refreshTimer);_refreshTimer=null;}
    showZipScreen();
  });

  requestAnimationFrame(()=>{
    scheduleRefresh(query);
    setupChart(
      document.getElementById('chart'),
      document.getElementById('chartTooltip'),
      hrs.map(x=>x.label),
      hrs.map(x=>x.temp),
      hrs.map(x=>x.rain)
    );
    if(aqiHrs.length){
      setupAQIChart(
        document.getElementById('aqiChart'),
        document.getElementById('aqiTooltip'),
        aqiHrs
      );
    }
    initRadar(lat, lon);
  });
}

/* ── BOOT ─────────────────────────────────────────────── */
const savedZip = localStorage.getItem('wx_zip') || DEFAULT_ZIP;
loadWeather(savedZip);
</script>
